<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Oldschool Twitter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background-color: #C6E2E8;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background-color: #5595BF; border-bottom: 2px solid #3B7BA8;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; height: 50px;
        }
        #header .left { display: flex; align-items: center; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        #header .bird { font-size: 26px; margin-right: 10px; }
        #header .nav-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 6px 14px; border-radius: 3px; font-size: 13px;
            cursor: pointer; margin-left: 8px; display: flex; align-items: center; gap: 4px;
        }
        #header .nav-btn:hover { background: rgba(255,255,255,0.3); }
        #main {
            margin-top: 50px; max-width: 800px; margin-left: auto; margin-right: auto;
            background-color: white; min-height: calc(100vh - 50px);
            border-left: 1px solid #E1E8ED; border-right: 1px solid #E1E8ED;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .profile-banner { height: 120px; background: #5595BF; position: relative; }
        .profile-info {
            padding: 0 20px 15px; border-bottom: 1px solid #E1E8ED;
            position: relative;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 8px; border: 4px solid white;
            position: absolute; top: -50px; left: 20px; background: #E1E8ED;
        }
        .profile-name {
            margin-top: 38px; font-size: 20px; font-weight: bold; color: #333;
        }
        .profile-handle { color: #8899A6; font-size: 14px; margin-top: 2px; }
        .profile-source { color: #8899A6; font-size: 12px; margin-top: 6px; word-break: break-all; }
        .profile-source a { color: #5595BF; text-decoration: none; }
        .profile-stats {
            display: flex; gap: 20px; margin-top: 10px; font-size: 13px;
        }
        .profile-stats span { color: #8899A6; }
        .profile-stats b { color: #333; }
        .profile-actions { margin-top: 10px; display: flex; gap: 8px; }
        .btn-subscribe {
            background-color: #5595BF; color: white; border: 1px solid #3B7BA8;
            padding: 6px 16px; border-radius: 3px; font-size: 13px; cursor: pointer;
        }
        .btn-subscribe:hover { background-color: #3B7BA8; }
        .btn-subscribe.subscribed { background: white; color: #5595BF; }
        .btn-back {
            background: white; color: #5595BF; border: 1px solid #5595BF;
            padding: 6px 16px; border-radius: 3px; font-size: 13px; cursor: pointer;
        }
        .btn-back:hover { background: #F5F8FA; }

        .timeline { background-color: white; }
        .tweet { border-bottom: 1px solid #E1E8ED; padding: 12px 20px; }
        .tweet:hover { background-color: #F9FBFC; }
        .tweet-avatar { width: 48px; height: 48px; border-radius: 5px; float: left; margin-right: 12px; background-color: #E1E8ED; }
        .tweet-header { margin-bottom: 4px; display: flex; align-items: center; }
        .tweet-user { font-weight: bold; color: #333; font-size: 14px; }
        .tweet-username { color: #8899A6; font-size: 13px; margin-left: 4px; }
        .tweet-time { color: #8899A6; font-size: 12px; margin-left: auto; }
        .tweet-body { margin-left: 60px; font-size: 14px; line-height: 1.5; color: #333; }
        .tweet-body p { margin-bottom: 6px; }
        .tweet-body a { color: #5595BF !important; text-decoration: none; }
        .tweet-body a:hover { text-decoration: underline; }
        .tweet-body blockquote { border-left: 3px solid #E1E8ED; padding: 8px 12px; margin: 8px 0; color: #66757F; background: #F5F8FA; border-radius: 0 5px 5px 0; }
        .tweet-body blockquote b { color: #333; }
        .tweet-actions { margin-left: 60px; margin-top: 6px; font-size: 12px; color: #8899A6; }
        .tweet-actions a { color: #8899A6; text-decoration: none; }
        .tweet-actions a:hover { color: #5595BF; }
        .retweet-indicator { color: #8899A6; font-size: 12px; margin-bottom: 4px; margin-left: 60px; }
        .img-gallery { display: grid; gap: 3px; margin-top: 8px; border-radius: 8px; overflow: hidden; }
        .img-gallery.g1 { grid-template-columns: 1fr; }
        .img-gallery.g2 { grid-template-columns: 1fr 1fr; }
        .img-gallery.g3 { grid-template-columns: 1fr 1fr; }
        .img-gallery.g4 { grid-template-columns: 1fr 1fr; }
        .img-gallery.g3 .gi:first-child { grid-column: 1 / -1; }
        .img-gallery.g4 .gi:first-child { grid-column: 1 / -1; }
        .img-gallery.g5,.img-gallery.g6,.img-gallery.g7,.img-gallery.g8,.img-gallery.g9 { grid-template-columns: 1fr 1fr 1fr; }
        .gi { position: relative; cursor: pointer; overflow: hidden; background: #E1E8ED; }
        .gi img { width: 100%; display: block; transition: filter 0.15s; }
        .gi:hover img { filter: brightness(0.85); }
        .gi.more-overlay::after { content: attr(data-more); position: absolute; inset: 0; background: rgba(0,0,0,0.5); color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; }
        .gi.video-thumb::before { content: '\25B6'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.6); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 1; pointer-events: none; }
        .img-gallery.g1 .gi { max-height: 400px; }
        .img-gallery.g1 .gi img { max-height: 400px; object-fit: contain; background: #000; }
        .img-gallery:not(.g1) .gi img { height: 100%; min-height: 120px; max-height: 220px; object-fit: cover; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 4px; }
        .lightbox-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 36px; cursor: pointer; z-index: 510; }
        .lightbox-close:hover { color: #ccc; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: white; font-size: 40px; cursor: pointer; padding: 15px 20px; border-radius: 5px; z-index: 510; }
        .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
        .lightbox-prev { left: 15px; }
        .lightbox-next { right: 15px; }
        .lightbox-counter { position: absolute; bottom: 20px; color: white; font-size: 14px; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 20px; }
        .loading { text-align: center; padding: 40px; color: #8899A6; }
        .empty-state { text-align: center; padding: 50px 20px; color: #8899A6; }
        .empty-state h3 { margin-bottom: 10px; color: #333; font-size: 16px; }
        #toast { position: fixed; top: 60px; right: 10px; padding: 10px 20px; border-radius: 5px; font-size: 13px; z-index: 200; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-width: 400px; }
        #toast.show { display: block; }
        #toast.error { background: #FFCDD2; color: #C62828; }
        #toast.success { background: #C8E6C9; color: #2E7D32; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>
    <div id="header">
        <div class="left" onclick="window.location.href='/'">
            <span class="bird">&#128038;</span> Oldschool Twitter
        </div>
        <div style="display:flex;align-items:center;">
            <button class="nav-btn" onclick="window.location.href='/'">&#8592; Timeline</button>
        </div>
    </div>
    <div id="main">
        <div id="profile-header"></div>
        <div class="timeline" id="timeline">
            <div class="loading">Lade Profil...</div>
        </div>
    </div>
    <script>
        var currentPage=1,loading=false,hasMore=false,lbImgs=[],lbIdx=0,profileData={};

        var params=new URLSearchParams(window.location.search);
        var feedUrl=params.get('feed')||'';

        if(!feedUrl){window.location.href='/';}

        function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

        function avatarFallback(el){
            var d=document.createElement('div');
            d.className='tweet-avatar';
            d.style.cssText='background:#5595BF;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px';
            d.textContent=el.alt?el.alt.charAt(0).toUpperCase():'?';
            el.parentNode.replaceChild(d,el);
        }

        function profileAvatarFallback(el){
            var d=document.createElement('div');
            d.className='profile-avatar';
            d.style.cssText='background:#5595BF;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:30px';
            d.textContent=el.alt?el.alt.charAt(0).toUpperCase():'?';
            el.parentNode.replaceChild(d,el);
        }

        function openLB(tid,idx){
            var g=document.querySelector('[data-gallery="'+tid+'"]');
            if(!g)return;
            lbImgs=Array.from(g.querySelectorAll('.gi img')).map(function(img){return img.src;});
            lbIdx=idx;showLB();
            document.getElementById('lightbox').classList.add('open');
            document.addEventListener('keydown',lbKey);
        }
        function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.removeEventListener('keydown',lbKey);}
        function lbNav(d){lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length;showLB();}
        function showLB(){document.getElementById('lightbox-img').src=lbImgs[lbIdx];document.getElementById('lightbox-counter').textContent=(lbIdx+1)+' / '+lbImgs.length;}
        function lbKey(e){if(e.key==='Escape')closeLightbox();else if(e.key==='ArrowLeft')lbNav(-1);else if(e.key==='ArrowRight')lbNav(1);}

        function showToast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;setTimeout(function(){el.className='';},5000);}

        async function loadProfile(){
            try{
                var res=await fetch('/api/profile/'+encodeURIComponent(feedUrl));
                var data=await res.json();
                profileData=data;
                document.title=(data.creator||data.feed_title)+' - Oldschool Twitter';
                var headerEl=document.getElementById('profile-header');
                var avatarHtml;
                if(data.profile_image){
                    avatarHtml='<img class="profile-avatar" src="'+data.profile_image+'" alt="'+esc(data.creator)+'" onerror="profileAvatarFallback(this)">';
                } else {
                    avatarHtml='<div class="profile-avatar" style="background:#5595BF;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:30px">'+esc((data.creator||'?').charAt(0).toUpperCase())+'</div>';
                }
                headerEl.innerHTML='<div class="profile-banner"></div>'
                    +'<div class="profile-info">'
                    +avatarHtml
                    +'<div class="profile-name">'+esc(data.feed_title||data.creator||'Unbekannt')+'</div>'
                    +'<div class="profile-handle">'+esc(data.creator||'')+'</div>'
                    +'<div class="profile-source"><a href="'+esc(data.feed_url)+'" target="_blank">'+esc(data.feed_url)+'</a></div>'
                    +'<div class="profile-stats"><span><b>'+data.total+'</b> Tweets</span></div>'
                    +'<div class="profile-actions"><button class="btn-subscribe '+(data.is_subscribed?'subscribed':'')+'" onclick="toggleSubscribe()">'+(data.is_subscribed?'Abonniert':'Abonnieren')+'</button></div>'
                    +'</div>';
            }catch(e){showToast('Profil laden fehlgeschlagen','error');}
        }

        async function toggleSubscribe(){
            var feeds=await(await fetch('/api/feeds')).json();
            var isSub=feeds.includes(feedUrl);
            try{
                if(isSub){
                    if(!confirm('Feed entfernen und alle Tweets/Bilder löschen?'))return;
                    await fetch('/api/feeds',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:feedUrl})});
                    showToast('Feed entfernt','success');
                }else{
                    await fetch('/api/feeds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:feedUrl})});
                    showToast('Feed abonniert!','success');
                }
                await loadProfile();
            }catch(e){showToast('Fehler: '+e.message,'error');}
        }

        async function loadTimeline(append){
            if(loading)return;
            loading=true;
            var container=document.getElementById('timeline');
            if(!append){container.innerHTML='<div class="loading">Lade Tweets...</div>';currentPage=1;}
            try{
                var res=await fetch('/api/profile/'+encodeURIComponent(feedUrl)+'?page='+currentPage+'&per_page=20');
                var data=await res.json();
                var items=data.items||[];
                hasMore=data.has_more;
                if(!items.length&&!append){container.innerHTML='<div class="empty-state"><h3>Keine Tweets</h3>Für diesen Feed wurden keine Tweets gefunden.</div>';loading=false;return;}
                var html=items.map(renderTweet).join('');
                if(!append) container.innerHTML=html;
                else container.insertAdjacentHTML('beforeend',html);
            }catch(e){if(!append) container.innerHTML='<div class="empty-state" style="color:#cc0000"><h3>Fehler</h3>'+e.message+'</div>';}
            finally{loading=false;}
        }

        function extractImgs(desc){
            var tmp=document.createElement('div');tmp.innerHTML=desc;
            var imgs=[];tmp.querySelectorAll('img').forEach(function(img){var s=img.getAttribute('src');if(s)imgs.push(s);});
            var vids=[];tmp.querySelectorAll('a').forEach(function(a){var t=a.textContent.trim().toLowerCase();var img=a.querySelector('img');if((t.includes('video')||t.includes('gif'))&&img)vids.push({src:img.getAttribute('src'),isVideo:true});});
            return {imgs:imgs,vids:vids};
        }

        function renderTweet(item){
            var creator=item.creator||'Unbekannt';
            var username=creator.replace('@','');
            var date=item.date?new Date(item.date).toLocaleString('de-DE'):'';
            var isRt=item.is_retweet;
            var rtCreator=item.rt_creator||'';
            var tid=item.link||Math.random().toString(36).substr(2,9);
            var desc=item.description||item.title||'';
            var ei=extractImgs(desc);
            var tmpD=document.createElement('div');
            tmpD.innerHTML=desc;
            tmpD.querySelectorAll('img').forEach(function(img){img.remove();});
            var textOnly=tmpD.innerHTML;
            var pSrc=item.profile_image||'';
            var avatarHtml;
            if(pSrc){
                avatarHtml='<img class="tweet-avatar" src="'+pSrc+'" alt="'+esc(username)+'" onerror="avatarFallback(this)">';
            } else {
                avatarHtml='<div class="tweet-avatar" style="background:#5595BF;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px">'+esc(username.charAt(0).toUpperCase())+'</div>';
            }
            var allImgs=ei.imgs.concat(ei.vids.map(function(v){return v.src;}));
            var galleryHtml='';
            if(allImgs.length>0){
                var cnt=allImgs.length;
                var gc=cnt<=9?'g'+cnt:'g9';
                var maxS=9;
                var show=allImgs.slice(0,maxS);
                var hasMoreCnt=cnt>maxS;
                var vidSet=new Set(ei.vids.map(function(v){return v.src;}));
                var itemsHtml=show.map(function(src,i){
                    var isV=vidSet.has(src);
                    var isLast=i===maxS-1&&hasMoreCnt;
                    var more=isLast?'+'+(cnt-maxS+1):'';
                    var cls='gi'+(isV?' video-thumb':'')+(isLast?' more-overlay':'');
                    return '<div class="'+cls+'" data-more="'+more+'" onclick="openLB(\''+esc(tid)+'\','+i+')"><img src="'+src+'" alt="" loading="lazy"></div>';
                }).join('');
                galleryHtml='<div class="img-gallery '+gc+'" data-gallery="'+esc(tid)+'">'+itemsHtml+'</div>';
            }
            var rtHtml=isRt?'<div class="retweet-indicator">&#8634; Retweet von '+esc(rtCreator)+'</div>':'';
            var gallerySection=galleryHtml?'<div class="tweet-body">'+galleryHtml+'</div>':'';
            return '<div class="tweet" style="overflow:auto;">'
                +rtHtml
                +'<div class="tweet-header">'
                +avatarHtml
                +'<span class="tweet-user">'+esc(username)+'</span>'
                +'<span class="tweet-username">'+esc(creator)+'</span>'
                +'<span class="tweet-time">'+date+'</span>'
                +'</div>'
                +'<div class="tweet-body">'+textOnly+'</div>'
                +gallerySection
                +'<div class="tweet-actions"><a href="'+item.link+'" target="_blank">&#128279; Auf Nitter ansehen</a></div>'
                +'</div>';
        }

        window.addEventListener('scroll',function(){if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-300&&!hasMore||loading)return;if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-300){currentPage++;loadTimeline(true);}});

        loadProfile();
        loadTimeline();
    </script>
</body>
</html>
