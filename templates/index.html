<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oldschool Twitter Timeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background-color: #C6E2E8;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background-color: #5595BF;
            border-bottom: 2px solid #3B7BA8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 50px;
        }
        #header .left {
            display: flex;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #header .bird { font-size: 26px; margin-right: 10px; }
        #header .nav-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            margin-left: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #header .nav-btn:hover { background: rgba(255,255,255,0.3); }
        #header .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #header .nav-btn.active { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.6); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; display: inline-block; }
        #main {
            margin-top: 50px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            background-color: white;
            min-height: calc(100vh - 50px);
            border-left: 1px solid #E1E8ED;
            border-right: 1px solid #E1E8ED;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* --- Sidebar / Feeds Page --- */
        #sidebar {
            position: fixed;
            top: 50px;
            left: 0;
            bottom: 0;
            width: 300px;
            background: #F5F8FA;
            border-right: 1px solid #E1E8ED;
            z-index: 90;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); }
        #sidebar .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #E1E8ED;
            font-weight: bold;
            font-size: 15px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sidebar .sidebar-header .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #8899A6;
        }
        #sidebar .sidebar-header .close-btn:hover { color: #333; }
        #sidebar .feed-add {
            padding: 12px 15px;
            border-bottom: 1px solid #E1E8ED;
        }
        #sidebar .feed-add input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #E1E8ED;
            border-radius: 3px;
            font-size: 13px;
            margin-bottom: 6px;
        }
        #sidebar .feed-add input[type="text"]:focus {
            outline: none;
            border-color: #5595BF;
        }
        #sidebar .feed-add button {
            background-color: #5595BF;
            color: white;
            border: 1px solid #3B7BA8;
            padding: 6px 14px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }
        #sidebar .feed-add button:hover { background-color: #3B7BA8; }
        #sidebar .feed-hint {
            font-size: 11px;
            color: #8899A6;
            margin-top: 6px;
        }
        #sidebar .feed-list {
            flex: 1;
            overflow-y: auto;
        }
        #sidebar .feed-item {
            padding: 10px 15px;
            border-bottom: 1px solid #E1E8ED;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
        }
        #sidebar .feed-item:hover { background: #E1E8ED; }
        #sidebar .feed-item .feed-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        #sidebar .feed-item .feed-url {
            font-size: 11px;
            color: #8899A6;
            display: block;
            margin-top: 2px;
            word-break: break-all;
        }
        #sidebar .feed-item .feed-delete {
            background: none;
            border: none;
            color: #8899A6;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        #sidebar .feed-item .feed-delete:hover { color: #C62828; background: #FFEBEE; }
        .sidebar-overlay {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 85;
            display: none;
        }
        .sidebar-overlay.open { display: block; }

        /* --- Status Bar --- */
        #status-bar {
            background: #E1E8ED;
            padding: 6px 20px;
            font-size: 11px;
            color: #8899A6;
            border-bottom: 1px solid #E1E8ED;
            display: flex;
            justify-content: space-between;
        }

        /* --- Timeline --- */
        .timeline { background-color: white; }
        .tweet {
            border-bottom: 1px solid #E1E8ED;
            padding: 12px 20px;
        }
        .tweet:hover { background-color: #F9FBFC; }
        .tweet-avatar {
            width: 48px;
            height: 48px;
            border-radius: 5px;
            float: left;
            margin-right: 12px;
            background-color: #E1E8ED;
        }
        .tweet-header {
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }
        .tweet-user { font-weight: bold; color: #333; font-size: 14px; }
        .tweet-username { color: #8899A6; font-size: 13px; margin-left: 4px; }
        .tweet-time { color: #8899A6; font-size: 12px; margin-left: auto; }
        .tweet-body {
            margin-left: 60px;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        .tweet-body p { margin-bottom: 6px; }
        .tweet-body img {
            max-width: 100%;
            border-radius: 5px;
            margin: 4px 0;
        }
        .tweet-body a { color: #5595BF !important; text-decoration: none; }
        .tweet-body a:hover { text-decoration: underline; }
        .tweet-body blockquote {
            border-left: 3px solid #E1E8ED;
            padding: 8px 12px;
            margin: 8px 0;
            color: #66757F;
            background: #F5F8FA;
            border-radius: 0 5px 5px 0;
        }
        .tweet-body blockquote b { color: #333; }
        .tweet-actions {
            margin-left: 60px;
            margin-top: 6px;
            font-size: 12px;
            color: #8899A6;
        }
        .tweet-actions a { color: #8899A6; text-decoration: none; }
        .tweet-actions a:hover { color: #5595BF; }
        .retweet-indicator {
            color: #8899A6;
            font-size: 12px;
            margin-bottom: 4px;
            margin-left: 60px;
        }
        .loading { text-align: center; padding: 40px; color: #8899A6; }
        .empty-state { text-align: center; padding: 50px 20px; color: #8899A6; }
        .empty-state h3 { margin-bottom: 10px; color: #333; font-size: 16px; }
        #toast {
            position: fixed;
            top: 60px;
            right: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 13px;
            z-index: 200;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            max-width: 400px;
        }
        #toast.show { display: block; }
        #toast.error { background: #FFCDD2; color: #C62828; }
        #toast.success { background: #C8E6C9; color: #2E7D32; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div id="header">
        <div class="left" onclick="toggleSidebar()">
            <span class="bird">&#128038;</span> Oldschool Twitter
        </div>
        <div style="display:flex;align-items:center;">
            <button class="nav-btn" id="feeds-btn" onclick="toggleSidebar()">&#9776; Feeds</button>
            <button class="nav-btn" id="refresh-btn" onclick="refreshTimeline(false)">&#8635; Aktualisieren</button>
            <button class="nav-btn" id="hard-refresh-btn" onclick="refreshTimeline(true)">&#8635;&#8635; Force</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            Abonnierte Feeds
            <button class="close-btn" onclick="toggleSidebar()">&times;</button>
        </div>
        <div class="feed-add">
            <input type="text" id="feed-url" placeholder="Nitter Profil-URL oder RSS-URL">
            <button id="add-btn" onclick="addFeed()">Feed hinzufügen</button>
            <div class="feed-hint">Profil: https://nitter.net/user &nbsp;|&nbsp; RSS: https://nitter.net/user/rss<br>Min. 10 Min zwischen Aktualisierungen.</div>
        </div>
        <div class="feed-list" id="feed-list"></div>
    </div>

    <div id="main">
        <div id="status-bar">
            <span id="tweet-count">0 Tweets geladen</span>
            <span id="last-refresh">Nie aktualisiert</span>
        </div>
        <div class="timeline" id="timeline">
            <div class="loading">Lade Timeline...</div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let loading = false;
        let hasMore = false;
        let sidebarOpen = false;

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
            document.getElementById('sidebar-overlay').classList.toggle('open', sidebarOpen);
            document.getElementById('feeds-btn').classList.toggle('active', sidebarOpen);
            if (sidebarOpen) loadFeeds();
        }

        document.getElementById('sidebar-overlay').addEventListener('click', () => {
            if (sidebarOpen) toggleSidebar();
        });

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show ' + type;
            setTimeout(() => el.className = '', 5000);
        }

        async function loadFeeds() {
            try {
                const res = await fetch('/api/feeds');
                const feeds = await res.json();
                const container = document.getElementById('feed-list');
                if (!feeds.length) {
                    container.innerHTML = '<div style="padding:20px;color:#8899A6;text-align:center;font-size:13px">Keine Feeds abonniert.<br>Füge einen hinzu.</div>';
                    return;
                }
                container.innerHTML = feeds.map(url => {
                    const parts = url.split('/').filter(Boolean);
                    const name = parts[parts.length - 1] === 'rss' ? parts[parts.length - 2] : parts[parts.length - 1];
                    return `
                        <div class="feed-item">
                            <div>
                                <span class="feed-name">@${name}</span>
                                <span class="feed-url">${url}</span>
                            </div>
                            <button class="feed-delete" onclick="removeFeed('${encodeURIComponent(url)}')" title="Feed entfernen">&times;</button>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('feed-list').innerHTML = '<div style="padding:20px;color:#cc0000">Fehler beim Laden</div>';
            }
        }

        async function addFeed() {
            const input = document.getElementById('feed-url');
            let url = input.value.trim();
            if (!url) return;
            try {
                const res = await fetch('/api/feeds', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                if (!res.ok) throw new Error('Server error');
                input.value = '';
                showToast('Feed hinzugefügt! Aktualisiere...', 'success');
                await loadFeeds();
                await refreshTimeline(false);
            } catch (e) {
                showToast('Fehler: ' + e.message, 'error');
            }
        }

        async function removeFeed(url) {
            if (!confirm('Feed und alle zugehörigen Tweets/Bilder entfernen?')) return;
            try {
                const res = await fetch('/api/feeds', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: decodeURIComponent(url)})
                });
                const data = await res.json();
                showToast(`Feed entfernt! (${data.deleted_images || 0} Bilder gelöscht, ${data.remaining_tweets || 0} Tweets übrig)`, 'success');
                await loadFeeds();
                currentPage = 1;
                await loadTimeline();
            } catch (e) {
                showToast('Fehler: ' + e.message, 'error');
            }
        }

        async function refreshTimeline(force = false) {
            const btn = document.getElementById('refresh-btn');
            const hardBtn = document.getElementById('hard-refresh-btn');
            btn.disabled = true;
            hardBtn.disabled = true;
            btn.innerHTML = '<span class="spinning">&#8635;</span> Lade...';
            try {
                const res = await fetch(`/api/refresh${force ? '?force=1' : ''}`, {method: 'POST'});
                const data = await res.json();
                const msg = data.new_tweets > 0
                    ? `${data.new_tweets} neue Tweets! (${data.total} gesamt)`
                    : `Keine neuen Tweets (${data.total} gesamt)`;
                showToast(msg, 'success');
                if (data.errors && data.errors.length > 0) {
                    const errMsg = data.errors.map(e => e.error).join(', ');
                    setTimeout(() => showToast('Feed-Fehler: ' + errMsg, 'error'), 600);
                }
                document.getElementById('last-refresh').textContent = 'Aktualisiert: ' + new Date().toLocaleTimeString('de-DE');
                currentPage = 1;
                await loadTimeline();
            } catch (e) {
                showToast('Fehler beim Aktualisieren: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                hardBtn.disabled = false;
                btn.innerHTML = '&#8635; Aktualisieren';
            }
        }

        async function loadTimeline(append = false) {
            if (loading) return;
            loading = true;
            const container = document.getElementById('timeline');

            if (!append) {
                container.innerHTML = '<div class="loading">Lade Timeline...</div>';
                currentPage = 1;
            }

            try {
                const res = await fetch(`/api/timeline?page=${currentPage}&per_page=20`);
                if (!res.ok) throw new Error('Server error');
                const data = await res.json();
                const items = data.items || [];
                hasMore = data.has_more;

                document.getElementById('tweet-count').textContent = `${data.total} Tweets geladen`;

                if (!items.length && !append) {
                    container.innerHTML = '<div class="empty-state"><h3>Keine Tweets</h3>Klicke "Aktualisieren" um Tweets zu laden.</div>';
                    loading = false;
                    return;
                }

                const html = items.map(item => renderTweet(item)).join('');
                if (!append) {
                    container.innerHTML = html;
                } else {
                    container.insertAdjacentHTML('beforeend', html);
                }
            } catch (e) {
                if (!append) {
                    container.innerHTML = '<div class="empty-state" style="color:#cc0000"><h3>Fehler</h3>' + e.message + '</div>';
                }
            } finally {
                loading = false;
            }
        }

        function renderTweet(item) {
            const creator = item.creator || 'Unbekannt';
            const username = creator.replace('@', '');
            const profileSrc = item.profile_image || '';
            const date = item.date ? new Date(item.date).toLocaleString('de-DE') : '';
            const isRt = item.is_retweet;
            const rtCreator = item.rt_creator || '';

            let avatarHtml;
            if (profileSrc) {
                avatarHtml = `<img class="tweet-avatar" src="${profileSrc}" alt="${username}" onerror="this.outerHTML='<div class=\\'tweet-avatar\\' style=\\'background:#5595BF;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px\\'>${username.charAt(0).toUpperCase()}</div>'">`;
            } else {
                avatarHtml = `<div class="tweet-avatar" style="background:#5595BF;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px">${username.charAt(0).toUpperCase()}</div>`;
            }

            return `
                <div class="tweet" style="overflow:auto;">
                    ${isRt ? `<div class="retweet-indicator">&#8634; Retweet von ${rtCreator}</div>` : ''}
                    <div class="tweet-header">
                        ${avatarHtml}
                        <span class="tweet-user">${username}</span>
                        <span class="tweet-username">${creator}</span>
                        <span class="tweet-time">${date}</span>
                    </div>
                    <div class="tweet-body">${item.description || item.title || ''}</div>
                    <div class="tweet-actions">
                        <a href="${item.link}" target="_blank">&#128279; Auf Nitter ansehen</a>
                    </div>
                </div>
            `;
        }

        function loadMore() {
            if (!hasMore || loading) return;
            currentPage++;
            loadTimeline(true);
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300) {
                loadMore();
            }
        });

        document.getElementById('feed-url').addEventListener('keypress', e => {
            if (e.key === 'Enter') addFeed();
        });

        loadTimeline();
        fetch('/api/timeline').then(r => r.json()).then(data => {
            if (data.total === 0) refreshTimeline(false);
        });
    </script>
</body>
</html>
