<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oldschool Twitter Timeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background-color: #C6E2E8;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        #container {
            width: 520px;
            margin: 0 auto;
            background-color: #F5F8FA;
            min-height: 100vh;
            border-left: 1px solid #E1E8ED;
            border-right: 1px solid #E1E8ED;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #header {
            background-color: #5595BF;
            padding: 10px 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #A8D5EA;
        }
        #header a { color: white; text-decoration: none; }
        #feed-form {
            background-color: #F5F8FA;
            padding: 15px;
            border-bottom: 1px solid #E1E8ED;
        }
        #feed-form input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #E1E8ED;
            border-radius: 3px;
            font-size: 14px;
            margin-bottom: 8px;
        }
        #feed-form button {
            background-color: #5595BF;
            color: white;
            border: 1px solid #3B7BA8;
            padding: 8px 16px;
            border-radius: 3px;
            font-size: 14px;
            cursor: pointer;
        }
        #feed-form button:hover { background-color: #3B7BA8; }
        #feeds-list {
            background-color: #F5F8FA;
            padding: 10px 15px;
            border-bottom: 1px solid #E1E8ED;
            font-size: 12px;
            min-height: 30px;
        }
        #feeds-list .feed-tag {
            display: inline-block;
            background-color: #E1E8ED;
            color: #5595BF;
            padding: 3px 8px;
            border-radius: 12px;
            margin: 3px 3px 3px 0;
            cursor: pointer;
        }
        #feeds-list .feed-tag:hover {
            background-color: #5595BF;
            color: white;
        }
        .timeline { background-color: white; }
        .tweet {
            border-bottom: 1px solid #E1E8ED;
            padding: 12px 15px;
        }
        .tweet:hover { background-color: #F5F8FA; }
        .tweet-header {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        .tweet-avatar {
            width: 48px;
            height: 48px;
            border-radius: 5px;
            flex-shrink: 0;
            margin-right: 10px;
            background-color: #E1E8ED;
        }
        .tweet-user { font-weight: bold; color: #333; font-size: 14px; }
        .tweet-time {
            color: #8899A6;
            font-size: 12px;
            margin-left: auto;
        }
        .tweet-content {
            margin-left: 58px;
            font-size: 14px;
            line-height: 1.4;
            color: #333;
        }
        .tweet-content p { margin-bottom: 8px; }
        .tweet-content img {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 8px;
        }
        .tweet-content a { color: #5595BF !important; }
        .tweet-content blockquote {
            border-left: 3px solid #E1E8ED;
            padding-left: 10px;
            margin: 8px 0;
            color: #66757F;
        }
        .tweet-actions {
            margin-left: 58px;
            margin-top: 8px;
            font-size: 12px;
            color: #8899A6;
        }
        .tweet-actions a { color: #8899A6; text-decoration: none; margin-right: 15px; }
        .loading { text-align: center; padding: 30px; color: #8899A6; }
        .error { text-align: center; padding: 20px; color: #cc0000; }
        .empty-state { text-align: center; padding: 40px 20px; color: #8899A6; }
        .empty-state h3 { margin-bottom: 10px; color: #333; }
        .retweet-indicator { color: #8899A6; font-size: 12px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">Oldschool Twitter Timeline</div>
        <div id="feed-form">
            <input type="text" id="feed-url" placeholder="RSS-Feed URL eingeben...">
            <button id="add-btn">Feed hinzufügen</button>
            <div id="feeds-list"></div>
        </div>
        <div class="timeline" id="timeline">
            <div class="loading">Lade Timeline...</div>
        </div>
    </div>

    <script>
        let timelineController;

        async function fetchWithTimeout(url, options = {}, timeout = 8000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            try {
                const res = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
                return res;
            } catch (e) {
                clearTimeout(timeoutId);
                throw e;
            }
        }

        async function loadFeeds() {
            try {
                const res = await fetchWithTimeout('/api/feeds', {}, 5000);
                const feeds = await res.json();
                const container = document.getElementById('feeds-list');
                if (!feeds.length) {
                    container.innerHTML = '<span style="color:#8899A6">Keine Feeds - füge einen hinzu</span>';
                    return;
                }
                container.innerHTML = feeds.map(url => {
                    const name = url.split('/').filter(Boolean).pop() || url;
                    return `<span class="feed-tag" onclick="removeFeed('${encodeURIComponent(url)}')" title="Klicken zum Entfernen">${name}</span>`;
                }).join('');
            } catch (e) {
                document.getElementById('feeds-list').innerHTML = '<span style="color:#cc0000">Feeds laden fehlgeschlagen: ' + e.message + '</span>';
            }
        }

        async function addFeed() {
            const input = document.getElementById('feed-url');
            const url = input.value.trim();
            if (!url) return;
            try {
                await fetch('/api/feeds', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                input.value = '';
                await loadFeeds();
                await loadTimeline();
            } catch (e) {
                alert('Feed hinzufügen fehlgeschlagen: ' + e.message);
            }
        }

        async function removeFeed(url) {
            if (!confirm('Feed entfernen?')) return;
            try {
                await fetch(`/api/feeds/${url}`, {method: 'DELETE'});
                await loadFeeds();
                await loadTimeline();
            } catch (e) {
                alert('Feed entfernen fehlgeschlagen');
            }
        }

        async function loadTimeline() {
            if (timelineController) timelineController.abort();
            const container = document.getElementById('timeline');
            container.innerHTML = '<div class="loading">Lade Timeline...</div>';
            try {
                if (timelineController) timelineController.abort();
                timelineController = new AbortController();
                const res = await fetch('/api/timeline', { signal: timelineController.signal });
                const items = await res.json();
                if (!items.length) {
                    container.innerHTML = '<div class="empty-state"><h3>Keine Tweets</h3>Füge einen RSS-Feed hinzu.</div>';
                    return;
                }
                container.innerHTML = items.map(item => {
                    const creator = item.creator || 'Unbekannt';
                    const profileImg = item.profile_image || 'https://nitter.privacyredirect.com/pic/ame-48.png';
                    const description = item.description || item.title || '';
                    const date = item.date ? new Date(item.date).toLocaleString('de-DE') : '';
                    const isRetweet = item.title && item.title.startsWith('RT by');
                    const rtMatch = description.match(/RT by @([^:]+):/);
                    const rtCreator = rtMatch ? rtMatch[1] : '';

                    return `
                        <div class="tweet">
                            ${isRetweet ? `<div class="retweet-indicator">↳ RT by @${rtCreator}</div>` : ''}
                            <div class="tweet-header">
                                <img class="tweet-avatar" src="${profileImg}" alt="${creator}" onerror="this.src='https://nitter.privacyredirect.com/pic/ame-48.png'">
                                <span class="tweet-user">${creator}</span>
                                <span class="tweet-time">${date}</span>
                            </div>
                            <div class="tweet-content">${description}</div>
                            <div class="tweet-actions">
                                <a href="${item.link}" target="_blank">Auf Nitter ansehen</a>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                if (e.name === 'AbortError') return;
                container.innerHTML = '<div class="error">Fehler: ' + e.message + '</div>';
            }
        }

        document.getElementById('add-btn').addEventListener('click', addFeed);
        document.getElementById('feed-url').addEventListener('keypress', e => {
            if (e.key === 'Enter') addFeed();
        });

        loadFeeds();
        loadTimeline();
    </script>
</body>
</html>
